services:
  - type: web
    name: evolutiaai-site
    runtime: static
    branch: main
    buildCommand: echo "Using committed static build"
    staticPublishPath: ./public
    envVars:
      - key: SKIP_INSTALL_DEPS
        value: "true"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
